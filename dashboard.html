<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <h2>ReliefLink</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="donate.html">Donate</a></li>
            <li><a href="request.html">Request Help</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <h1 class="dashboard-title">
        Dashboard
    </h1>
    <button onclick="toggleDisasterMode()" id="modeBtn">
        Activate Disaster Mode
    </button>

    <div class="dashboard">
        <a href="donations.html" class="card feature-card">
            <h2 id="donationCount">0</h2>
            <p>Donations</p>
        </a>
        <div class="card">
            <h2 id="mealCount">0</h2>
            <p>Food Quantity Donated</p>
        </div>


        <a href="requests.html" class="card feature-card">
            <h2 id="requestCount">0</h2>
            <p>Requests</p>
        </a>

        <div class="card">
            <h3>🏢 NGO Partners</h3>

            <p>Helping Hands Foundation</p>
            <p>Food For All</p>
            <p>Relief Care Trust</p>
        </div>

        <div class="card">
            <h2 id="volunteerCount">25</h2>
            <p>Volunteers</p>
        </div>

    </div>

    <script src="app.js"></script>

    <script>
        loadDashboard();
    </script>

</body>

</html>
